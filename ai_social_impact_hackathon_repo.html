
<style>
* { box-sizing: border-box; }

.stat b { font-size: 18px; font-weight: 500; color: var(--color-text-primary); display: block; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); padding-bottom: 1rem; }
.search-wrap { flex: 1; min-width: 160px; }
.search-wrap input { width: 100%; font-size: 13px; padding: 6px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }
.track-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.tf { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; transition: all 0.1s; }

.sf { font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 0.5px solid var(--color-border-tertiary); background: transparent; color: var(--color-text-tertiary); cursor: pointer; }
.sf.on { border-color: var(--color-border-warning); color: var(--color-text-warning); background: var(--color-background-warning); }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.1rem 1.2rem; cursor: pointer; transition: border-color 0.12s; }
.card:hover { border-color: var(--color-border-secondary); }
.card.open { border-width: 1.5px; }
.card-track { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }

.track-label { font-size: 11px; font-weight: 500; }
.card-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 5px; line-height: 1.4; }
.card-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; margin: 0 0 8px; }

.pill { font-size: 10px; padding: 2px 7px; border-radius: 20px; }

.pill-diff { background: var(--color-background-success); color: var(--color-text-success); }
.detail { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); }
.detail-row { font-size: 12px; color: var(--color-text-secondary); line-height: 1.55; margin-bottom: 6px; }
.detail-row b { font-weight: 500; color: var(--color-text-primary); }
.wow-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 6px 10px; font-size: 11px; color: var(--color-text-secondary); margin: 8px 0; }
.build-btn { font-size: 11px; padding: 4px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; margin-top: 6px; }
.build-btn:hover { background: var(--color-background-secondary); }
.empty { padding: 2rem 0; font-size: 13px; color: var(--color-text-tertiary); text-align: center; }
.add-btn { font-size: 12px; padding: 5px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; margin-left: auto; }
.add-btn:hover { background: var(--color-background-secondary); }
</style>

<script>
const TRACKS = [
  { id: "health", label: "health & wellbeing", color: "#E24B4A", text: "#791F1F" },
  { id: "education", label: "education & literacy", color: "#378ADD", text: "#0C447C" },
  { id: "environment", label: "environment & climate", color: "#639922", text: "#27500A" },
  { id: "refugee", label: "refugee & migration", color: "#1D9E75", text: "#085041" },
  { id: "disability", label: "disability access", color: "#7F77DD", text: "#3C3489" },
  { id: "economic", label: "economic empowerment", color: "#BA7517", text: "#633806" },
  { id: "safety", label: "public safety", color: "#D85A30", text: "#712B13" },
  { id: "elderly", label: "elderly care", color: "#D4537E", text: "#72243E" },
  { id: "mental", label: "mental health", color: "#534AB7", text: "#26215C" },
  { id: "civic", label: "civic & democracy", color: "#888780", text: "#444441" },
];

const IDEAS = [
  { track:"health", title:"Symptom triage voice assistant", desc:"Speak your symptoms; AI reasons through urgency and tells you whether to call 911, go to urgent care, or monitor at home — in your language.", sensors:["mic","voice out"], ai:"GPT-4o voice + triage logic", diff:"easy", stack:"Whisper STT → GPT-4o symptom reasoner → TTS urgency verdict", detail:"Multilingual voice interface. GPT-4o applies structured triage reasoning (ABCDE assessment) across spoken symptoms. Outputs urgency tier + plain-language explanation + nearest relevant facility. Designed for uninsured patients and rural communities far from a doctor.", wow:"Spoken symptoms → triage verdict in any language, no reading required" },
  { track:"health", title:"Skin condition camera triage", desc:"Photograph a skin concern; AI gives urgency level and plain-language guidance on whether to seek care, with dermatology referral if needed.", sensors:["camera"], ai:"GPT-4o vision", diff:"easy", stack:"GPT-4o vision → triage tier + explanation → optional referral map", detail:"Single photo, no preprocessing. GPT-4o assesses visible features, assigns urgency (monitor / clinic this week / ER now), and explains in plain language. Never diagnoses — always frames as triage. Bridges the 60-mile gap to the nearest dermatologist for rural patients.", wow:"Camera-as-triage tool — closes specialist access gap for rural communities" },
  { track:"health", title:"Medication adherence coach", desc:"Daily voice check-in asks if you took your meds, listens for side-effect reports, and alerts caregivers when patterns suggest missed doses or adverse reactions.", sensors:["mic","voice out"], ai:"Whisper + GPT-4o longitudinal", diff:"medium", stack:"Daily Whisper call → adherence + side-effect extraction → caregiver dashboard", detail:"Short daily call — 90 seconds. GPT-4o tracks adherence streaks, extracts mentioned side effects, flags dangerous patterns. Family or care coordinator sees a dashboard. Designed for elderly patients managing chronic conditions alone.", wow:"Longitudinal voice health record built one 90-second call at a time" },
  { track:"health", title:"Pill identifier & schedule builder", desc:"Point camera at any pill bottle or loose pills; AI identifies medications, reads dosage, and auto-builds a reminder schedule with voice readout.", sensors:["camera","voice out"], ai:"GPT-4o vision + OCR", diff:"easy", stack:"GPT-4o vision → med ID + dosage parse → reminder schedule + TTS", detail:"GPT-4o reads pill shape, color, imprint, and partially visible label text. Outputs medication name, purpose, schedule, and dangerous interactions if multiple pills detected. TTS reads everything for low-literacy users.", wow:"One photo → full medication brief + voice output; works on a $50 Android" },
  { track:"health", title:"Maternal health risk monitor", desc:"Pregnant women in low-resource settings answer a weekly voice questionnaire; AI flags high-risk patterns and routes them to the nearest clinic.", sensors:["mic","voice out"], ai:"Whisper + GPT-4o clinical reasoning", diff:"medium", stack:"Voice survey → symptom extraction → risk scoring → SMS clinic routing", detail:"Weekly 3-minute voice survey covers key maternal risk signs (swelling, headache, fetal movement, bleeding). GPT-4o scores risk using WHO antenatal care guidelines. High-risk flags trigger SMS to nearest clinic and community health worker. Designed for sub-Saharan Africa and rural South Asia.", wow:"Voice + WHO clinical guidelines → maternal mortality early warning system" },
  { track:"health", title:"Hearing loss speech trainer", desc:"Speaks phrases at varying volumes and accents; user repeats back; AI scores pronunciation accuracy and tracks hearing-adaptive speech improvement over time.", sensors:["mic","voice out"], ai:"Whisper + audio similarity scoring", diff:"medium", stack:"TTS phrase → Whisper transcription → phoneme-level diff → progress tracking", detail:"Generates phrases calibrated to hearing loss type. User repeats; Whisper transcribes; phoneme-level diff scores accuracy. Tracks progress across sessions. Designed for adults with partial hearing loss who cannot afford speech therapy.", wow:"AI speech therapist for the 1.5B people with uncorrected hearing loss" },
  { track:"health", title:"Mental wellness check via facial affect", desc:"Optional 30-second daily webcam check-in reads facial affect and micro-expressions to flag emotional state changes over time, gently nudging professional help.", sensors:["camera"], ai:"MediaPipe + GPT-4o vision affect", diff:"medium", stack:"MediaPipe FaceMesh → affect classifier → longitudinal trend → nudge engine", detail:"Fully opt-in. FaceMesh extracts expression features. GPT-4o interprets affect trajectory across days. When sustained negative affect is detected, offers a warm prompt and a link to resources — never diagnosing. On-device inference option for privacy.", wow:"Daily 30-second webcam → longitudinal emotional wellness signal" },
  { track:"health", title:"Air quality personal health advisor", desc:"GPS location + real-time AQI data + your health profile (asthma, COPD, pregnancy) generate personalized daily air quality advice and activity recommendations.", sensors:["gps"], ai:"LLM personalization", diff:"easy", stack:"GPS → AirNow AQI → user health profile → GPT-4o personalized daily brief", detail:"Not a generic AQI widget — it reasons about your specific conditions. 'You have asthma and today's PM2.5 is 68 — avoid outdoor exercise. Here are 3 indoor alternatives.' Sends morning briefing as push or SMS.", wow:"Generic AQI → personalized health-specific action plan" },
  { track:"health", title:"Community disease outbreak detector", desc:"Aggregates anonymized symptom reports from a neighborhood, detects spatial clustering, and alerts public health workers before official case counts emerge.", sensors:["gps"], ai:"LLM anomaly + spatial reasoning", diff:"hard", stack:"Anonymous symptom submission + GPS cluster → LLM outbreak reasoning → health worker alert", detail:"Users report symptoms via a simple form. System clusters by geography and symptom type. LLM reasons about whether clustering is statistically significant vs seasonal noise. Generates a plain-language alert for local public health teams. Designed to catch outbreaks 5-7 days before hospital data surfaces.", wow:"Crowdsourced symptoms → early outbreak signal ahead of official data" },

  { track:"education", title:"Emotion-aware study companion", desc:"Webcam reads facial expression and posture while a student studies; when frustration or disengagement is detected, the AI adapts tone — simpler explanations, encouragement, breaks.", sensors:["camera"], ai:"MediaPipe + GPT-4o adaptive tutor", diff:"medium", stack:"MediaPipe FaceMesh → engagement classifier → GPT-4o adaptive tutoring voice", detail:"Tracks 468 facial landmarks. Engagement states mapped from expression + posture. GPT-4o receives state + lesson context and adjusts. Designed for K-12 students studying alone without tutors.", wow:"Camera becomes an emotional IQ sensor — tutoring that reads the room" },
  { track:"education", title:"Oral reading fluency coach", desc:"Child reads aloud from a book or screen; AI measures words per minute, errors, and expression — gives teachers a fluency score and targeted feedback.", sensors:["mic"], ai:"Whisper + phoneme analysis", diff:"medium", stack:"Whisper aligned transcription → WPM + error rate + prosody → teacher report", detail:"Whisper forced-alignment computes per-word timing. Error detection flags substitutions, omissions, insertions. Prosody scoring via pitch variance. Generates a Dibels-style fluency report for teachers. Runs on a $30 tablet.", wow:"Research-grade reading assessment on any device with a microphone" },
  { track:"education", title:"First-generation college application coach", desc:"Voice-first application coach guides low-income first-gen students through essays, financial aid, and deadlines — like having a college counselor in your pocket.", sensors:["mic","voice out"], ai:"GPT-4o agentic coach", diff:"medium", stack:"Voice dialogue → essay coaching + FAFSA guidance + deadline tracking", detail:"Student speaks freely about their background. GPT-4o asks Socratic questions to extract compelling essay material, drafts and iterates, tracks application deadlines, explains financial aid line by line. Designed for students whose schools have one counselor per 400 students.", wow:"College counselor access democratized to any student with a phone" },
  { track:"education", title:"Dyslexia-adaptive reading assistant", desc:"Camera reads any physical page and renders it in real time with dyslexia-friendly fonts, spacing, and color overlays — while narrating in the user's reading pace.", sensors:["camera","voice out"], ai:"GPT-4o vision + accessibility rendering", diff:"medium", stack:"Camera OCR → accessibility text transform → TTS synchronized reader", detail:"GPT-4o OCR extracts text from physical textbooks, worksheets, or any printed material. Renders with OpenDyslexic font, increased letter spacing, pastel overlay. TTS reads with per-word highlighting. User sets their own pace. Works on any physical document without any special preparation.", wow:"Any physical page becomes a dyslexia-accessible digital document instantly" },
  { track:"education", title:"Language immersion conversation partner", desc:"Conversational AI maintains a dialogue entirely in the target language, adapting complexity to the learner's level and gently correcting without breaking the flow.", sensors:["mic","voice out"], ai:"GPT-4o multilingual voice", diff:"easy", stack:"Whisper STT → GPT-4o immersion partner → TTS response + inline correction", detail:"Adapts complexity in real time — detects when learner is struggling (long pauses, error patterns) and simplifies. Corrections delivered naturally: 'Just to mention — we say X in this context.' Logs vocab and grammar patterns for a teacher dashboard. Targeted at adult migrants learning the language of their new country.", wow:"Infinite patience, no embarrassment — the conversation partner everyone deserves" },
  { track:"education", title:"STEM visual explainer from photos", desc:"Student photographs a confusing textbook diagram or formula and gets a step-by-step spoken walkthrough with a generated animation.", sensors:["camera","voice out"], ai:"GPT-4o vision + TTS", diff:"easy", stack:"Photo → GPT-4o visual reasoning → step-by-step narrated explanation", detail:"GPT-4o interprets the diagram, identifies what concept it represents, and generates a layered explanation from bottom up. TTS narrates while the original image stays on screen. Works for chemistry molecular diagrams, physics force diagrams, math graphs. No teacher needed for after-hours homework help.", wow:"Point at any textbook diagram → instant visual walkthrough" },
  { track:"education", title:"Refugee child school integration kit", desc:"Translates school materials in real time, generates culturally adapted explanations, and helps a newly arrived child navigate classroom routines via a voice companion.", sensors:["camera","mic","voice out"], ai:"GPT-4o multilingual multimodal", diff:"medium", stack:"Camera OCR + voice → translate + cultural adapt → child-friendly TTS", detail:"Photograph a worksheet, school notice, or textbook. GPT-4o translates and re-explains in the child's home language with culturally familiar analogies. Voice companion answers questions about school rules, schedules, social norms. Designed for children arriving mid-semester with no English.", wow:"Translates not just language but cultural context — for a child's first week" },
  { track:"education", title:"Low-literacy adult skills trainer", desc:"Fully voice-driven adult education platform teaches numeracy, job applications, and basic digital skills to adults who cannot read — zero text required.", sensors:["mic","voice out"], ai:"GPT-4o voice-only UI", diff:"medium", stack:"Voice-only GPT-4o interaction → adaptive skill curriculum → progress via speech", detail:"No text in the UI. Every interaction is spoken. GPT-4o adapts curriculum to demonstrated skill level. Covers: counting change, reading a bus schedule by photo, filling out a job application by answering questions aloud. Designed for the 775 million adults globally who are functionally illiterate.", wow:"Education with zero reading requirement — voice in, voice out, fully adaptive" },
  { track:"education", title:"Teacher workload AI assistant", desc:"Teacher narrates lesson feedback and student observations during class; AI transcribes, categorizes, and generates draft progress reports and parent communications.", sensors:["mic"], ai:"Whisper + GPT-4o document generation", diff:"easy", stack:"Continuous mic → Whisper → observation extractor → report/email drafter", detail:"Teacher speaks naturally while circulating the room: 'Maria is struggling with fractions, very engaged in group work.' System extracts student name + observation + date. At end of day, one click generates draft progress notes and parent emails per student. Saves 5-8 hours of admin per week.", wow:"Ambient voice capture → structured student records and parent comms" },

  { track:"environment", title:"Wildfire evacuation voice navigator", desc:"GPS + live fire perimeter data + AQI feeds an AI that gives spoken turn-by-turn evacuation routing, updating every 60 seconds as conditions shift.", sensors:["gps","voice out"], ai:"LLM spatial routing", diff:"medium", stack:"NIFC GeoJSON + AirNow + GPS → LLM route reasoning → TTS turn-by-turn", detail:"NIFC publishes live fire perimeters as GeoJSON. LLM reasons over fire position, wind direction, road network, shelter locations. Voiced directions so eyes stay on road. Route refreshes every 60s. Also sends route to family via SMS. Designed for the 90-second evacuation window when roads are chaotic.", wow:"LLM reasoning over live disaster data — evacuation routing that updates in real time" },
  { track:"environment", title:"Neighborhood environmental justice narrator", desc:"Stand anywhere; GPS + EPA toxic release data + air quality history tells you the pollution story of your exact block — narrated like a walking tour.", sensors:["gps","voice out"], ai:"LLM narrative generation", diff:"easy", stack:"GPS → EPA AQS + TRI database → LLM narrative → TTS location-aware story", detail:"Queries EPA Air Quality System and Toxic Release Inventory for the user's coordinates. LLM generates a spoken narrative: who polluted here, what chemicals, what the community did. Designed for environmental justice activists, journalists, community organizers.", wow:"Your GPS coordinates → personalized environmental justice history, narrated" },
  { track:"environment", title:"Crowdsourced pothole & hazard mapper", desc:"Phone accelerometer passively detects road hazards while driving; GPS-tags and maps them to a public dashboard that city engineers can act on.", sensors:["gps","accelerometer"], ai:"Anomaly detection", diff:"easy", stack:"DeviceMotion g-force spike → GPS tag → clustering → public heatmap + CSV export", detail:"PWA runs passively while phone is mounted. G-force spike + orientation change = candidate hazard. Clusters 3+ reports = confirmed. Optional rear camera frame capture for visual confirmation. Public map + city-downloadable CSV. For under-resourced cities that can't afford LIDAR inspection trucks.", wow:"Every daily commuter becomes a city infrastructure sensor node" },
  { track:"environment", title:"Food waste reduction kitchen assistant", desc:"Photograph your fridge; AI identifies what's about to expire and generates recipes using only those ingredients, prioritizing items closest to their end date.", sensors:["camera","voice out"], ai:"GPT-4o vision + recipe gen", diff:"easy", stack:"Fridge photo → GPT-4o item + expiry detection → prioritized recipe generation + TTS", detail:"GPT-4o reads visible expiry dates, assesses produce freshness by visual cues, and generates recipes ranked by urgency. Voice narration for hands-free cooking. Also generates a shopping list for what you actually need. Designed for households and small food service operations.", wow:"Fridge photo → zero-waste meal plan in 10 seconds" },
  { track:"environment", title:"Carbon footprint daily voice log", desc:"Speak your day — commute, meals, purchases — and AI calculates your carbon footprint in real time, comparing to local and global averages with actionable swaps.", sensors:["mic","voice out","gps"], ai:"Whisper + LLM carbon accounting", diff:"easy", stack:"Voice log → entity extraction → carbon DB lookup → GPT-4o personalized coaching", detail:"User narrates their day casually. GPT-4o extracts transport mode, food, purchases, energy use. Maps to carbon equivalents using EPA and IPCC factors. Gives a daily score + 1 specific swap recommendation. GPS detects commute mode automatically for passive logging.", wow:"Voice diary → real-time personal carbon accounting" },
  { track:"environment", title:"Invasive species reporter", desc:"Photograph a plant or animal you don't recognize; AI identifies if it's invasive, confirms its location via GPS, and submits to citizen science databases automatically.", sensors:["camera","gps"], ai:"GPT-4o vision species ID", diff:"easy", stack:"Photo + GPS → GPT-4o species ID → invasive check → iNaturalist API submit", detail:"GPT-4o identifies species from photo with high confidence. Cross-references invasive species databases by region. Auto-submits to iNaturalist with GPS coordinates. Generates a plain-language report for local parks departments. Turns every hiker into an environmental monitoring node.", wow:"Every hiker becomes an invasive species early-warning system" },
  { track:"environment", title:"Flood risk real-time advisor", desc:"GPS + FEMA flood maps + weather forecast tells you in plain language whether to shelter in place or evacuate, updated hourly during storm events.", sensors:["gps"], ai:"LLM risk reasoning", diff:"easy", stack:"GPS → FEMA flood layer + NOAA forecast → LLM risk reasoning → plain-language advice", detail:"FEMA flood map zones + NOAA precipitation forecast + current stream gauge levels feed an LLM that reasons about your specific address. Output: 'You are in Zone AE. Current forecast puts 3 inches of rain overnight — evacuation recommended by 8pm.' Designed for first responders and residents during hurricane and flood events.", wow:"Address-specific flood risk reasoning — not a generic warning, a personal decision" },
  { track:"environment", title:"Energy waste auditor via camera", desc:"Walk through your home or office pointing your camera; AI identifies energy waste — lights on in empty rooms, inefficient appliances, HVAC issues — and estimates savings.", sensors:["camera"], ai:"GPT-4o vision energy audit", diff:"easy", stack:"Camera walkthrough → GPT-4o scene analysis → waste identification → savings estimate", detail:"GPT-4o identifies: incandescent bulbs, always-on electronics, unsealed windows, old appliances by model, HVAC vents blocked. Generates a prioritized fix list with estimated annual savings per item. Designed for low-income households who can't afford a professional energy audit ($300-500).", wow:"$0 DIY energy audit — camera walkthrough replaces a $400 professional inspection" },
  { track:"environment", title:"Water quality community monitor", desc:"Communities photograph water sources and describe observations (color, smell, foam); AI aggregates reports spatially and flags anomalies to environmental regulators.", sensors:["camera","gps"], ai:"GPT-4o vision + spatial aggregation", diff:"medium", stack:"Photo + GPS + voice description → GPT-4o assessment → spatial cluster → regulator alert", detail:"Visual analysis of water color, turbidity, foam, algae. Voice description adds smell, taste (if safe to describe). GPS-tagged reports cluster spatially. LLM assesses whether cluster indicates contamination event vs natural variation. Generates a formal incident report for EPA or local authority submission. Designed for communities near industrial sites.", wow:"Community eyes + AI analysis → formal regulatory complaint, built in minutes" },

  { track:"refugee", title:"Document translator & explainer", desc:"Point camera at any official document in any language — visa, medical form, court notice — and hear a plain-language explanation in your native tongue.", sensors:["camera","voice out"], ai:"GPT-4o vision + multilingual TTS", diff:"easy", stack:"Photo → GPT-4o OCR + translate + simplify → TTS in detected language", detail:"GPT-4o reads the document visually, detects source language, translates, simplifies, and speaks the result. Handles stamps, handwriting, poor scan quality. Special handling for asylum paperwork, medical intake, school enrollment. No literacy required.", wow:"Point, shoot, listen — no language or literacy barriers" },
  { track:"refugee", title:"Asylum interview preparation coach", desc:"Voice-based coach simulates asylum interview questions, helps refugees articulate their story coherently, flags inconsistencies, and explains legal terminology.", sensors:["mic","voice out"], ai:"GPT-4o voice roleplay", diff:"medium", stack:"Voice dialogue → GPT-4o asylum interview coach → feedback + story coherence check", detail:"Simulates realistic USCIS and UNHCR interview questioning styles. GPT-4o listens for chronological inconsistencies that could cause problems in a real interview. Explains legal terms when they arise. Delivered in the refugee's language. Designed for use in waiting periods before a legal aid appointment.", wow:"Legal prep that doesn't require a lawyer — in your language, on your schedule" },
  { track:"refugee", title:"Safe route mapper for displaced people", desc:"GPS + conflict/hazard data layer + real-time border crossing status recommends the safest route for people in displacement, updated as conditions change.", sensors:["gps"], ai:"LLM spatial safety reasoning", diff:"hard", stack:"GPS + ACLED conflict data + UNHCR crossing status → LLM route safety reasoning → SMS output", detail:"ACLED (Armed Conflict Location & Event Data) provides near-real-time conflict event locations. UNHCR posts border crossing status. LLM reasons over hazards, chooses safest corridor, considers time of day. Outputs via SMS — works without smartphone data. Designed for NGO field workers and displaced persons.", wow:"Conflict-aware routing using live humanitarian data feeds" },
  { track:"refugee", title:"Skills-to-job matching in new country", desc:"Refugee describes work experience by voice in their language; AI maps skills to local job market equivalencies and generates a ready-to-submit CV in the local language.", sensors:["mic"], ai:"Whisper + GPT-4o skills mapping", diff:"easy", stack:"Voice work history → skill extraction → local job market mapping → CV generation", detail:"Whisper transcribes in native language. GPT-4o extracts skills, maps to local equivalents (e.g. 'market trader' → 'retail sales, inventory management, cash handling'), generates a formatted CV in the local language and job market style. Includes a suggested cover letter template. Tackles credential non-recognition.", wow:"Skills described in Arabic → market-ready CV in German, ready to send" },
  { track:"refugee", title:"Trauma-aware mental health companion", desc:"Gentle voice companion for people who have experienced displacement and trauma — listens, validates, offers grounding exercises, and connects to culturally competent care.", sensors:["mic","voice out"], ai:"GPT-4o trauma-informed dialogue", diff:"medium", stack:"Voice dialogue → GPT-4o trauma-informed LLM → grounding exercises → care referral", detail:"Trained on trauma-informed communication principles — never pushing, always validating, culturally aware. Offers grounding techniques (breathing, sensory anchoring) on request. Detects crisis signals and connects to local mental health resources. Available in 15+ languages. Designed for the 68M+ displaced people globally.", wow:"Trauma-informed voice support in 15 languages — available at 3am in a camp" },
  { track:"refugee", title:"Family reunification search assistant", desc:"Helps separated families submit structured search requests to ICRC and UNHCR databases via voice, and monitors for matches — no literacy or internet literacy required.", sensors:["mic","voice out"], ai:"Whisper + form-filling agent", diff:"medium", stack:"Voice interview → structured ICRC/UNHCR search format → submission + polling", detail:"GPT-4o conducts a gentle voice interview to collect: full names, ages, last known location, physical descriptions, distinguishing features. Formats and submits to ICRC Restoring Family Links and UNHCR databases via API. Polls for matches and notifies via SMS. No reading or typing required.", wow:"Voice interview → formal family reunification database submission" },
  { track:"refugee", title:"Cultural orientation guide", desc:"New arrivals ask voice questions about daily life in their new country — transport, healthcare system, school enrollment, cultural norms — in their own language.", sensors:["mic","voice out"], ai:"GPT-4o country-specific knowledge", diff:"easy", stack:"Voice question → GPT-4o country-specific knowledge base → TTS answer", detail:"GPT-4o maintains country-specific knowledge: how to ride the subway, how to register a child for school, what to bring to a doctor's appointment, tipping culture, emergency numbers. Answers in the user's language. Location-aware for city-specific information. Designed for the first 90 days in a new country.", wow:"The answer to every 'how does this country work' question, in your language" },
  { track:"refugee", title:"Child language bridge for school", desc:"Newly arrived child speaks to their phone in their native language; AI generates a written note for their teacher explaining their needs, and translates teacher responses back.", sensors:["mic","voice out"], ai:"GPT-4o multilingual relay", diff:"easy", stack:"Child voice → translation + context → teacher note → teacher response → child voice reply", detail:"Child says: 'I don't understand the math homework and I'm scared.' App generates a professional teacher note. Teacher replies in writing. App reads the reply to the child in their language. Simple relay bridging language gap in real time. Also works for parent-teacher communication.", wow:"Two-way language bridge for a child's most vulnerable first weeks" },

  { track:"disability", title:"Blind navigation assistant", desc:"Continuous camera feed narrates the environment in real time — obstacles, signs, crosswalks, queues — delivered as calm spatial audio to earbuds.", sensors:["camera","gps","voice out"], ai:"GPT-4o vision streaming", diff:"hard", stack:"GPT-4o vision frames every 2s → spatial scene description → TTS earpiece", detail:"GPT-4o processes camera every ~2 seconds. Narrates: obstacles, text on signs, people's positions, crosswalk state. GPS adds context: 'You are 30m from the bus stop.' User asks questions by voice: 'What does the sign ahead say?' Designed for blind and low-vision users navigating unfamiliar areas.", wow:"Continuous ambient vision narration — GPT-4o as a seeing-eye AI" },
  { track:"disability", title:"Real-time ASL interpreter for video calls", desc:"Browser extension reads the remote participant's ASL signing via webcam and displays a live transcript — and converts the hearing person's speech to text for the Deaf participant.", sensors:["camera","mic"], ai:"MediaPipe + ASL classifier + Whisper", diff:"hard", stack:"WebRTC video → MediaPipe Hands + pose → ASL classifier → overlay transcript; mic → Whisper → Deaf caption", detail:"MediaPipe extracts hand + body landmarks from WebRTC stream. WLASL-trained classifier maps sequences to words. Real-time overlay transcript. Reverse: Whisper transcribes hearing speaker for Deaf participant. Two-way bridge built entirely on browser APIs. Eliminates interpreter cost for routine calls.", wow:"Two-way ASL↔speech bridge — built entirely in the browser" },
  { track:"disability", title:"Dyslexia reading assistant from camera", desc:"Point camera at any physical page; AI renders it live with dyslexia-friendly fonts, spacing, color overlays, and synchronized TTS narration.", sensors:["camera","voice out"], ai:"GPT-4o vision OCR + accessibility", diff:"medium", stack:"Camera OCR → accessibility text transform → TTS with per-word highlight", detail:"Works on physical textbooks, menus, signs, handouts — anything. Renders with OpenDyslexic font, increased letter spacing, pastel overlay chosen by user. TTS reads with per-word highlighting synchronized to visual. User sets pace. No document preparation needed.", wow:"Any physical text becomes a dyslexia-accessible experience in real time" },
  { track:"disability", title:"AAC voice board for non-verbal users", desc:"Non-verbal users build sentences using AI-predicted symbol suggestions from context and head-gaze tracking — faster and more accurate than traditional AAC devices.", sensors:["camera"], ai:"GPT-4o contextual prediction", diff:"hard", stack:"Webcam gaze tracking → GPT-4o next-symbol prediction → TTS sentence output", detail:"Webcam-based eye/head gaze tracking selects symbols. GPT-4o predicts the next most likely symbols given sentence context — dramatically reducing selections needed. Outputs full spoken sentence via TTS. Designed for people with ALS, cerebral palsy, or locked-in syndrome. Browser-based, no $8,000 AAC device required.", wow:"Context-aware prediction reduces AAC selections by 60% — faster communication" },
  { track:"disability", title:"Tremor-compensating voice notepad", desc:"Users with Parkinson's or essential tremor speak their notes and actions; AI filters out tremor-affected speech patterns and converts to clean text reliably.", sensors:["mic"], ai:"Whisper + tremor-adaptive STT", diff:"medium", stack:"Whisper + audio preprocessing for tremor patterns → clean transcription → note organizer", detail:"Tremor-affected speech has characteristic elongations, repetitions, and volume variations. Audio preprocessing normalizes these before Whisper transcription. GPT-4o post-processes for coherence. Designed for Parkinson's patients who have lost fine motor control for typing but retain voice.", wow:"Custom audio pipeline that understands tremor-affected speech" },
  { track:"disability", title:"Sign language learning tutor with live feedback", desc:"Webcam watches your hands; MediaPipe tracks 21 landmarks per frame; AI coaches your ASL in the browser with real-time correctness feedback.", sensors:["camera"], ai:"MediaPipe + LLM coach", diff:"medium", stack:"MediaPipe Hands WASM → pose classifier → GPT-4o natural language coaching", detail:"MediaPipe runs entirely in-browser. 21 3D landmarks per frame at 30fps. Classifier maps poses to ASL letters and words. GPT-4o generates specific coaching feedback. Progress tracking stored locally. Designed for hearing family members of Deaf relatives.", wow:"Real-time hand tracking + AI coach — runs in-browser, no install" },
  { track:"disability", title:"Cognitive daily routine companion", desc:"For people with cognitive disabilities or acquired brain injuries — a voice companion that reads the daily schedule, walks through each step, and checks in at each transition.", sensors:["mic","voice out"], ai:"GPT-4o structured routine agent", diff:"easy", stack:"Routine schedule input → GPT-4o voice step-through → confirmation listening → caregiver log", detail:"Caregiver inputs the daily routine once. App calls out each step at the right time, waits for voice confirmation, and logs completion. Gentle re-prompting if no response. Caregiver app sees real-time adherence. Designed for people with Down syndrome, TBI, or early dementia.", wow:"AI caregiver presence for the hours between professional support visits" },
  { track:"disability", title:"Low-vision grocery & product reader", desc:"Point camera at any product in a store; AI reads the label aloud — ingredients, allergens, nutritional info, price — so low-vision users can shop independently.", sensors:["camera","voice out"], ai:"GPT-4o vision + TTS", diff:"easy", stack:"Camera → GPT-4o label reading → prioritized info extraction → TTS", detail:"GPT-4o reads small print labels, expiry dates, allergy warnings. User can ask: 'Does this have gluten? What's the price per ounce? Is this the low-sodium version?' Responds conversationally. Designed for low-vision and blind users who currently need a sighted companion to shop.", wow:"Independent shopping for low-vision users — any product, any store" },

  { track:"economic", title:"Voice-first financial ledger for informal workers", desc:"Street vendors narrate daily sales in any language; AI structures them into a financial record and builds the income history needed to qualify for microloans.", sensors:["mic"], ai:"Whisper + GPT-4o entity extraction", diff:"easy", stack:"Whisper multilingual STT → GPT-4o ledger extraction → income trend → microloan profile", detail:"Vendor says: 'Sold 40 samosas at 15 rupees and 12 drinks at 20.' Whisper transcribes in their language. GPT-4o structures into a ledger entry. Builds income/expense trends over weeks. Generates a financial profile document NGO microloan programs accept. For 2 billion informal economy workers globally.", wow:"Voice ledger → financial identity for the unbanked in any language" },
  { track:"economic", title:"Gig worker rights & pay advisor", desc:"Gig workers describe their work situation; AI identifies likely wage theft, misclassification, or rights violations and generates a formal complaint template.", sensors:["mic"], ai:"Whisper + GPT-4o legal reasoning", diff:"easy", stack:"Voice situation description → GPT-4o labor law reasoning → rights brief + complaint template", detail:"User describes: platform, hours, pay rate, deductions, incidents. GPT-4o cross-references state and federal gig worker protections. Identifies: minimum wage violations, tips stolen, illegal deductions, misclassification. Generates a pre-filled complaint for the relevant labor authority. Designed for Uber/DoorDash/Instacart workers.", wow:"Voice description → formal labor complaint in 5 minutes" },
  { track:"economic", title:"Job interview coach with real-time feedback", desc:"Practice job interviews out loud; AI plays the interviewer, scores your answer on clarity and relevance, and coaches you on specific improvements.", sensors:["mic","voice out"], ai:"GPT-4o voice dialogue + scoring", diff:"easy", stack:"Voice answer → GPT-4o interviewer role → scoring rubric → specific coaching feedback", detail:"User picks job type and experience level. GPT-4o conducts a realistic interview. After each answer: scores on relevance, specificity, confidence markers, filler words. Gives specific rewrites. Longitudinal tracking shows improvement. Designed for first-time job seekers, career changers, and immigrants navigating new job markets.", wow:"Unlimited practice interviews with specific, actionable feedback" },
  { track:"economic", title:"Small business cash flow predictor", desc:"Business owner narrates this week's transactions by voice; AI builds a running cash flow model and warns of shortfalls 2-3 weeks ahead.", sensors:["mic"], ai:"Whisper + GPT-4o financial modeling", diff:"medium", stack:"Voice transactions → ledger extraction → cash flow model → forward projection + alert", detail:"Owner speaks naturally: 'Paid rent $2,000, sold 15 units at $40, expecting invoice payment next week.' GPT-4o maintains a running model. Flags: 'At this rate you will be negative in 18 days — here are 2 options to address it.' Designed for micro-businesses with no accountant.", wow:"Casual voice narration → 3-week cash flow forecast with early warning" },
  { track:"economic", title:"Resume builder from work photos", desc:"Worker photographs job sites, tools used, products built; AI infers skills and generates a professional resume — for people who have never written one.", sensors:["camera"], ai:"GPT-4o vision + resume gen", diff:"easy", stack:"Work photos → GPT-4o skill inference → structured resume → downloadable PDF", detail:"GPT-4o looks at: construction site photos, tools, machinery, finished products, safety equipment, team photos. Infers skills, experience level, industries. Generates a professional resume with skills section, work history summary, and objective statement. User fills in dates via voice. Designed for blue-collar workers entering new job markets.", wow:"A gallery of work photos → a professional resume, no writing required" },
  { track:"economic", title:"Benefits eligibility screener", desc:"User describes their situation by voice; AI cross-references federal and state benefits databases and tells them exactly which programs they likely qualify for with application links.", sensors:["mic","voice out"], ai:"GPT-4o benefits reasoning", diff:"easy", stack:"Voice situation intake → GPT-4o benefits eligibility reasoning → program list + application guide", detail:"Covers: SNAP, Medicaid, WIC, LIHEAP, EITC, housing assistance, CHIP, unemployment. User describes household size, income, situation. GPT-4o screens against eligibility criteria. Output: 'You likely qualify for SNAP (~$320/month) and LIHEAP — here's how to apply and what to bring.' Designed for people who don't know what they're eligible for.", wow:"Turns 12 separate benefit websites into one 5-minute voice conversation" },
  { track:"economic", title:"Agricultural market price advisor", desc:"Smallholder farmer asks about prices for their crop by voice; AI pulls real-time market prices, recommends when and where to sell, and flags price manipulation.", sensors:["mic","gps","voice out"], ai:"Whisper + LLM market reasoning", diff:"medium", stack:"Voice crop inquiry + GPS → market price API → LLM selling strategy → TTS advice", detail:"Pulls prices from regional commodity exchanges and local market SMS price services. GPS determines which markets are accessible. LLM reasons about optimal timing and destination. Alerts to suspicious price clustering that may indicate middleman collusion. Designed for Sub-Saharan African and South Asian smallholders.", wow:"Equips smallholders with market intelligence that middlemen have always had" },
  { track:"economic", title:"Skill-to-freelance market bridge", desc:"User describes what they can do by voice; AI maps it to the global freelance market, identifies 5 best-fit gig types, and generates profile text for Upwork or Fiverr.", sensors:["mic"], ai:"Whisper + GPT-4o market mapping", diff:"easy", stack:"Voice skills description → market mapping → platform-specific profile + proposal templates", detail:"User speaks freely about their skills and experience. GPT-4o maps to freelance market demand and competition levels. Generates optimized platform profiles, a bio, 3 sample service listings, and a proposal template. Explains the platform mechanics. Designed for workers in lower-income countries entering the global gig economy.", wow:"Spoken skills → market-ready freelance profile for a global income stream" },

  { track:"safety", title:"Domestic violence safety planner", desc:"Voice-guided AI helps a person in a dangerous situation build a safety plan — escape routes, evidence collection, shelter locations — without leaving a digital trace.", sensors:["mic","voice out"], ai:"GPT-4o safety planning", diff:"medium", stack:"Voice dialogue → safety plan generation → local shelter routing → no-trace mode", detail:"No-trace mode: clears history, uses no cookies, leaves no browser record. GPT-4o walks through: safety triggers, exit routes, items to take, who to contact, nearest DV shelter with GPS routing. Generates a plan the user can memorize or send to one trusted contact. Designed in consultation with DV organizations.", wow:"Safety planning that leaves no digital trace — built for the highest-risk moment" },
  { track:"safety", title:"Crisis distress voice detector", desc:"Microphone listens passively for distress signals — screaming, crying, glass breaking — and silently alerts trusted contacts with GPS location.", sensors:["mic","gps"], ai:"TensorFlow.js YAMNet on-device", diff:"medium", stack:"Web Audio API → YAMNet on-device classifier → silent alert + GPS to contacts", detail:"YAMNet runs entirely on-device via TensorFlow.js — no audio leaves the phone. Detects: screaming, crying, glass breaking, gunshots. Silent 10-second confirmation window. No response → SMS to contacts with GPS. Designed for DV survivors, elderly alone, students in dangerous situations.", wow:"On-device audio classification — audio never leaves the phone" },
  { track:"safety", title:"Missing persons photo matcher", desc:"Upload a photo of a missing person; AI searches publicly shared social media and missing persons databases for visual matches, returning leads for investigators.", sensors:["camera"], ai:"GPT-4o vision + face description matching", diff:"hard", stack:"Photo → face feature description → NCMEC DB + public social search → match candidates", detail:"Generates a detailed textual face description (not a face vector — no biometric storage). Searches NCMEC and NamUs missing persons databases by description. Flags visual similarity in public post searches. Returns ranked candidates for human review. Designed for family members and volunteer search organizations.", wow:"Non-biometric visual search — description-based to protect privacy" },
  { track:"safety", title:"Community violence pattern detector", desc:"Aggregates 911 call data, social media reports, and GPS incident reports to predict high-risk windows and locations 24-48 hours ahead for patrol and social services.", sensors:["gps"], ai:"LLM pattern reasoning + time-series", diff:"hard", stack:"Open 911 data + social reports + GPS → clustering + LLM trend analysis → social services alert", detail:"Uses open 311/911 data APIs available in most major US cities. Clusters incidents spatially and temporally. LLM reasons about precursor patterns: 'This intersection has had 3 noise complaints + 2 minor incidents over 5 days — consistent with a pre-escalation pattern.' Routes to social services, not just police.", wow:"Predicts escalation before violence — routes to prevention, not just response" },
  { track:"safety", title:"School threat report voice assistant", desc:"Students or staff speak a concern anonymously; AI structures it into a formal threat assessment report for administrators with urgency triage.", sensors:["mic"], ai:"Whisper + GPT-4o threat assessment", diff:"easy", stack:"Anonymous voice report → Whisper → threat assessment framework → admin alert", detail:"Fully anonymous — no login, no audio stored. GPT-4o applies a structured threat assessment framework (behavioral indicators, specificity, timeline). Outputs urgency tier and structured report to school safety officer. Designed to lower the barrier to reporting concerns before incidents escalate.", wow:"Lowers the barrier to speaking up — anonymous voice → structured safety alert" },
  { track:"safety", title:"Driver fatigue & distraction detector", desc:"Front-facing camera monitors driver eye state and head position; AI detects microsleeps and distraction events, sounding a voice alert before a crash occurs.", sensors:["camera","voice out"], ai:"MediaPipe FaceMesh + blink classifier", diff:"medium", stack:"MediaPipe FaceMesh → eye aspect ratio + head pose → microsleep classifier → voice alert", detail:"Eye Aspect Ratio (EAR) detects blink frequency and microsleep events. Head pose estimation flags prolonged looking away. Runs at 15fps on a mounted phone. Voice alert: 'Eyes on the road.' Logs fatigue events. Designed for long-haul truckers and rideshare drivers — occupations with high fatigue-related accident rates.", wow:"Runs on any mounted phone — no special hardware for fatigue detection" },
  { track:"safety", title:"Earthquake aftermath damage reporter", desc:"Photograph structural damage after an earthquake; AI classifies severity, estimates safety, and auto-submits a geotagged damage report to local emergency management.", sensors:["camera","gps"], ai:"GPT-4o vision structural assessment", diff:"easy", stack:"Damage photo + GPS → GPT-4o structural classification → severity report → EM agency submission", detail:"GPT-4o identifies: cracked foundations, collapsed walls, tilted structures, gas pipe damage. Classifies as: inhabitable / restricted access / unsafe / destroyed. Generates a structured ATC-20 style report with GPS coordinates. Auto-submits to local OES. Designed for community volunteers in first hours after a seismic event.", wow:"Community phones become a post-earthquake damage assessment network" },
  { track:"safety", title:"Human trafficking hotspot alerter", desc:"GPS detects when a phone enters a known high-risk location; AI sends a discreet check-in to the user and allows a one-tap silent distress signal to a trusted contact.", sensors:["gps","mic"], ai:"LLM risk assessment + geofencing", diff:"medium", stack:"GPS geofence → risk DB → discreet check-in → one-tap distress signal + contact alert", detail:"Uses DHS and NGO-curated high-risk location data. Discreet check-in: a seemingly normal notification ('Your reminder is due'). User signals distress by not responding within 5 minutes. Contacts receive GPS + last 30-second audio clip. Designed for at-risk individuals, social workers, and undercover investigators.", wow:"Discreet geofenced safety net with no visible distress signal required" },

  { track:"elderly", title:"Fall detection with silent SOS", desc:"Phone accelerometer monitors for fall signatures passively; sends a 'are you OK?' prompt — no response in 60 seconds triggers a GPS-tagged SOS to emergency contacts.", sensors:["accelerometer","gps","voice out"], ai:"DeviceMotion classifier", diff:"easy", stack:"DeviceMotion API → fall classifier → push check-in → Twilio SOS + GPS", detail:"Browser DeviceMotion API — no app install needed. Sudden spike + orientation change = fall candidate. Big 'I'm OK' button. 60 seconds no interaction → SMS to contacts with GPS. Runs as a PWA in background. Designed for elderly people living alone.", wow:"Passive always-on safety net using hardware already in every pocket" },
  { track:"elderly", title:"Daily voice companion & wellness check", desc:"Daily 5-minute voice call asks about sleep, pain, mood, appetite — tracking subtle shifts over time and alerting family when patterns indicate decline.", sensors:["mic","voice out"], ai:"Whisper + GPT-4o longitudinal tracking", diff:"medium", stack:"Daily call → Whisper → GPT-4o wellness extraction → longitudinal model → family dashboard", detail:"Warm, unhurried conversation. GPT-4o tracks: sleep quality, appetite, pain, mood, social contact, cognitive clarity. Embeds subtle memory and orientation checks naturally ('What did you have for dinner yesterday?'). Family portal shows week-over-week trends. Flags anomalies: 3-day sadness streak, confusion, mentions of a fall.", wow:"Longitudinal voice health record — weeks of data reveal what a single call hides" },
  { track:"elderly", title:"Medication reminder with voice confirmation", desc:"Calls out medication reminders at the right time; listens for voice confirmation; escalates to caregiver if a dose is missed three times in a row.", sensors:["mic","voice out"], ai:"Whisper + GPT-4o conversation", diff:"easy", stack:"Schedule → TTS reminder → Whisper listen → confirmation → miss counter → caregiver SMS", detail:"Smart speaker or phone calls out: 'Time for your evening medications — lisinopril and metformin. Have you taken them?' Listens for yes/no/confused response. Three missed doses → caregiver SMS with timestamp log. Handles common confusions: 'Which pill is which? When did I last take it?'", wow:"Closes the most dangerous gap in chronic disease management: missed doses" },
  { track:"elderly", title:"Memory & cognitive exercise partner", desc:"Daily voice brain games — word recall, storytelling, math, trivia — calibrated to the user's cognitive level and tracked over time to detect early decline.", sensors:["mic","voice out"], ai:"GPT-4o adaptive cognitive games", diff:"easy", stack:"Voice game session → Whisper → GPT-4o adaptive difficulty → longitudinal cognitive score", detail:"GPT-4o conducts daily exercises: 'I'll tell you 5 words — remember them. We'll come back to them.' Adjusts difficulty to performance. Tracks response latency, word-finding errors, reasoning accuracy. Longitudinal score provides early warning of cognitive decline. Designed for adults with MCI risk.", wow:"Fun daily voice games that are actually a longitudinal cognitive screen" },
  { track:"elderly", title:"Scam & fraud real-time interceptor", desc:"Elderly user can hold their phone up to a suspicious call; AI listens and gives a real-time scam probability score and coaching on what to say or not say.", sensors:["mic","voice out"], ai:"Whisper + GPT-4o scam pattern detection", diff:"medium", stack:"Live call audio → Whisper STT → GPT-4o scam pattern classifier → real-time coaching", detail:"Common scam patterns detected: fake IRS, Medicare fraud, grandparent scam, tech support, lottery. Real-time score displayed visually + whispered coaching: 'This sounds like a Medicare scam — do not give your Medicare number.' Log kept for reporting to FTC. Designed for elderly adults who lose $3.4B annually to phone fraud.", wow:"Real-time scam interceptor — AI whispers in your ear during the call" },
  { track:"elderly", title:"Photo memoir & life story builder", desc:"Elderly person describes old photos by voice; AI structures their stories into a written memoir, organized chronologically, that family can keep.", sensors:["camera","mic","voice out"], ai:"GPT-4o vision + STT + narrative generation", diff:"easy", stack:"Photo + voice story → GPT-4o narrative structuring → memoir document + photo captions", detail:"User photographs old photos and speaks about them. GPT-4o extracts: people, places, dates, emotions, stories. Structures into a memoir draft with chapters. Generates captions for each photo. Produces a downloadable PDF the family receives. Designed for elderly people who want to preserve their life story but can't type.", wow:"Every photo becomes a chapter — a life story captured before it's lost" },
  { track:"elderly", title:"Grocery delivery voice assistant", desc:"Elderly user dictates their grocery list naturally by voice; AI parses it, resolves ambiguities, and submits the order to Instacart or AmazonFresh — no app navigation required.", sensors:["mic","voice out"], ai:"Whisper + GPT-4o order agent", diff:"medium", stack:"Voice list → Whisper → GPT-4o product resolution → delivery API → confirmation readback", detail:"Natural speech: 'I need bread — the whole wheat kind I usually get — and some bananas, not too ripe.' GPT-4o resolves product specifics, confirms choices aloud, handles substitution preferences. Submits to delivery API. Reads back the final order for confirmation. Designed for elderly with limited mobility or digital literacy.", wow:"Grocery ordering with zero app navigation — just speak your list" },
  { track:"elderly", title:"Social isolation activity matchmaker", desc:"Elderly person describes their interests by voice; AI identifies local clubs, senior center events, or volunteer opportunities and makes the first contact on their behalf.", sensors:["mic","gps"], ai:"Whisper + GPT-4o + local search", diff:"medium", stack:"Voice interests + GPS → local event search → GPT-4o match reasoning → draft outreach message", detail:"User speaks: 'I used to love gardening and I miss playing cards with people.' GPT-4o maps interests to local senior center programming, community gardens, volunteer opportunities. Finds contact info, drafts an outreach message for the user to send or reads it aloud for phone. Designed to address the loneliness epidemic in adults 65+.", wow:"Turns a voice conversation about hobbies into a social connection" },

  { track:"mental", title:"Anxiety trigger pattern mapper", desc:"Daily voice journal extracts emotional triggers and maps them on a calendar heatmap — after 2 weeks, surfaces patterns ('Sunday evenings are your highest-anxiety window').", sensors:["mic"], ai:"Whisper + GPT-4o longitudinal extraction", diff:"easy", stack:"Voice journal → trigger extraction → calendar heatmap → LLM pattern synthesis", detail:"User speaks freely for 60 seconds daily. GPT-4o extracts triggers, people, places, time context. Accumulates into a trigger map. After 2+ weeks: 'Work deadlines and social plans on the same day are your most consistent trigger.' Designed for people on therapy waitlists who need to understand their own patterns.", wow:"60 seconds/day → a personal anxiety pattern map after 2 weeks" },
  { track:"mental", title:"Grounding companion for panic attacks", desc:"Detects panic onset via accelerometer (rapid breathing pattern, freezing) and launches an immediate grounding session — 5-4-3-2-1 sensory technique guided by voice.", sensors:["accelerometer","mic","voice out"], ai:"Motion classifier + GPT-4o voice guide", diff:"medium", stack:"Accelerometer breath/stillness pattern → panic classifier → GPT-4o grounding session TTS", detail:"Rapid shallow breathing creates characteristic accelerometer micro-vibrations. Sudden stillness after movement also flags. Immediate voice: 'I'm here. Let's breathe together.' Guides through 5-4-3-2-1 sensory grounding, box breathing, body scan. User can also manually trigger. Logs episodes for therapist review.", wow:"Passive panic detection — help arrives before the user has to ask for it" },
  { track:"mental", title:"CBT thought record assistant", desc:"User speaks a negative automatic thought; AI walks them through a CBT thought record — identifying cognitive distortions, generating balanced alternatives — all by voice.", sensors:["mic","voice out"], ai:"GPT-4o CBT-informed dialogue", diff:"easy", stack:"Voice thought → GPT-4o CBT framework → distortion ID + reframe → voice output", detail:"User speaks: 'I said something stupid in the meeting and everyone thinks I'm an idiot.' GPT-4o identifies: mind-reading, catastrophizing, all-or-nothing thinking. Guides through evidence for/against. Generates a balanced thought. Stores the record for a therapist to review. Designed for people in CBT therapy who need between-session support.", wow:"CBT therapy between sessions — a thought record completed by voice in 3 minutes" },
  { track:"mental", title:"Sleep quality voice log & coach", desc:"User narrates how they slept; AI tracks sleep quality over time, identifies patterns, and recommends evidence-based sleep hygiene changes personalized to their habits.", sensors:["mic","accelerometer"], ai:"Whisper + GPT-4o sleep coach", diff:"easy", stack:"Morning voice log + accelerometer sleep proxy → GPT-4o sleep hygiene coach → weekly insight", detail:"Morning voice check-in: 'I woke up 3 times, felt anxious around 3am, finally got up at 7.' GPT-4o extracts quality metrics. Accelerometer provides passive sleep duration proxy. Tracks correlations: 'On days you exercise, you wake up 40% less. On days you use your phone after 10pm, you have more 3am waking.' Delivers specific evidence-based recommendations.", wow:"Spoken sleep diary → correlations between habits and sleep quality" },
  { track:"mental", title:"Grief support companion", desc:"Voice companion for people experiencing grief — listens, validates, shares gentle psychoeducation about grief stages, and checks in on anniversary dates.", sensors:["mic","voice out"], ai:"GPT-4o grief-informed dialogue", diff:"easy", stack:"Voice dialogue → GPT-4o grief-informed LLM → psychoeducation + check-in calendar", detail:"GPT-4o trained on grief-informed communication: normalizes all emotions, never rushes stages, gently offers psychoeducation when welcome. Tracks anniversaries, birthdays of the deceased, and proactively checks in. Connects to bereavement support groups. Designed for people without access to grief counseling.", wow:"Proactive check-ins on the hardest dates — grief support that remembers" },
  { track:"mental", title:"Burnout early warning system", desc:"Passively tracks work patterns — voice tone, phone usage, activity levels — and surfaces a burnout risk score with specific contributing factors and recovery recommendations.", sensors:["mic","accelerometer"], ai:"Passive signal + GPT-4o synthesis", diff:"hard", stack:"Mic tone analysis + accelerometer activity + usage patterns → burnout risk model → weekly brief", detail:"Tracks: changes in voice energy and affect during work calls, activity level reduction, phone usage patterns, sleep quality. Combines into a burnout risk score. Weekly brief: 'Your voice energy during calls has dropped 30% this week. You've had 4 days with under 3,000 steps. Burnout risk: elevated.' Designed for high-pressure workers.", wow:"Passive multi-signal burnout detection — warns you before you hit the wall" },
  { track:"mental", title:"Mood-based music & activity recommender", desc:"User checks in by voice; AI matches their emotional state to music, activities, or micro-interventions proven to shift mood — delivered as a 20-minute plan.", sensors:["mic","voice out"], ai:"Whisper + GPT-4o mood mapping", diff:"easy", stack:"Voice mood check-in → emotional state classification → evidence-based intervention matching → TTS plan", detail:"User speaks how they feel. GPT-4o classifies emotional state and energy level. Recommends: specific music (Spotify deep link), a 10-minute walk route, a breathing exercise, a social action, a creative prompt — all matched to the specific state. Evidence-based interventions from positive psychology. Delivers as a spoken 20-minute micro-plan.", wow:"Personalized mood intervention plan in 60 seconds — not generic advice" },
  { track:"mental", title:"Therapist session prep & debrief assistant", desc:"Before a session: helps user organize what they want to discuss. After: summarizes key insights and action items so nothing is forgotten before the next appointment.", sensors:["mic","voice out"], ai:"Whisper + GPT-4o session scaffolding", diff:"easy", stack:"Pre/post voice session → GPT-4o structure extraction → summary + action items + next-session prep", detail:"Pre-session (5 min): guided voice reflection generates an agenda. Post-session (10 min): user debriefs what happened; GPT-4o extracts key insights, homework items, themes to return to. Generates a structured note the user and optionally the therapist can review. Maximizes the value of expensive therapy time.", wow:"Doubles the value of every therapy session with prep and debrief scaffolding" },

  { track:"civic", title:"Plain-language ballot explainer", desc:"Photograph your sample ballot; AI explains every measure, candidate, and proposition in plain language — what it does, who supports it, and what the arguments are on both sides.", sensors:["camera","voice out"], ai:"GPT-4o vision + balanced reasoning", diff:"easy", stack:"Ballot photo → GPT-4o measure parsing → balanced explainer + TTS", detail:"GPT-4o reads the ballot image, identifies each item, and explains: what it would actually do, who funded the campaign for and against, the strongest argument on each side. Resolutely non-partisan — always presents both sides. Multilingual. Designed for first-time voters, low-literacy voters, and immigrants naturalized recently.", wow:"Every ballot measure explained in plain language — in your language" },
  { track:"civic", title:"Community meeting transcriber & summarizer", desc:"Record a city council or community meeting by voice; AI transcribes, identifies speakers, extracts action items and voting records, and publishes a structured summary.", sensors:["mic"], ai:"Whisper + GPT-4o meeting intelligence", diff:"easy", stack:"Meeting audio → Whisper diarization → GPT-4o action extraction → structured public summary", detail:"Whisper speaker diarization identifies different voices. GPT-4o extracts: motions made, votes cast, action items assigned, deadlines set. Generates a structured summary + full searchable transcript. Publishes to a public URL. Designed for under-resourced municipalities that can't afford professional transcription services.", wow:"Any phone → a searchable, structured record of local democratic proceedings" },

const SENSORS_ALL = ["camera","gps","mic","accelerometer","voice out"];
let activeTrack = "all", activeSensors = new Set(), searchQ = "", openIdx = null;

function trackOf(id) { return TRACKS.find(t => t.id === id); }

function buildStats() {
  const el = document.getElementById("stats");
  el.innerHTML = `
    <div class="stat"><b>${IDEAS.length}</b>total ideas</div>
    <div class="stat"><b>${TRACKS.length}</b>tracks</div>
    <div class="stat"><b>${[...new Set(IDEAS.map(i=>i.diff))].length}</b>difficulty tiers</div>
  `;
}

function buildTrackFilters() {
  const el = document.getElementById("track-filters");
  el.innerHTML = `<button class="tf on" data-t="all">all tracks</button>` +
    TRACKS.map(t => `<button class="tf" data-t="${t.id}" style="border-color:${t.color}20">${t.label}</button>`).join('');
  el.addEventListener("click", e => {
    const t = e.target.dataset.t; if (!t) return;
    activeTrack = t; openIdx = null;
    el.querySelectorAll(".tf").forEach(b => b.classList.toggle("on", b.dataset.t === t));
    render();
  });
}

function buildSensorFilters() {
  const el = document.getElementById("sensor-filters");
  el.innerHTML = `<span style="font-size:11px;color:var(--color-text-tertiary);align-self:center;margin-right:2px">sensor:</span>` +
    SENSORS_ALL.map(s => `<button class="sf" data-s="${s}">${s}</button>`).join('');
  el.addEventListener("click", e => {
    const s = e.target.dataset.s; if (!s) return;
    activeSensors.has(s) ? activeSensors.delete(s) : activeSensors.add(s);
    e.target.classList.toggle("on", activeSensors.has(s));
    openIdx = null; render();
  });
}

function matches(idea) {
  if (activeTrack !== "all" && idea.track !== activeTrack) return false;
  if (activeSensors.size > 0 && ![...activeSensors].every(s => idea.sensors.includes(s))) return false;
  if (searchQ) {
    const q = searchQ.toLowerCase();
    const blob = [idea.title, idea.desc, idea.stack, idea.detail, idea.ai, ...idea.sensors].join(" ").toLowerCase();
    if (!blob.includes(q)) return false;
  }
  return true;
}

function render() {
  const shown = IDEAS.filter(matches);
  document.getElementById("results-meta").textContent = `${shown.length} idea${shown.length !== 1 ? "s" : ""}`;
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  if (!shown.length) {
    grid.innerHTML = `<div class="empty">No ideas match — try adjusting filters or search.</div>`;
    return;
  }
  shown.forEach(idea => {
    const idx = IDEAS.indexOf(idea);
    const tr = trackOf(idea.track);
    const isOpen = openIdx === idx;
    const card = document.createElement("div");
    card.className = "card" + (isOpen ? " open" : "");
    if (isOpen) card.style.borderColor = tr.color;
    const diffColor = idea.diff === "easy" ? "pill-diff" : idea.diff === "medium" ? "pill-ai" : "pill-sensor";
    card.innerHTML = `
      <div class="card-track">
        <span class="track-dot" style="background:${tr.color}"></span>
        <span class="track-label" style="color:${tr.color}">${tr.label}</span>
      </div>
      <p class="card-title">${idea.title}</p>
      <p class="card-desc">${idea.desc}</p>
      <div class="pills">
        ${idea.sensors.map(s=>`<span class="pill pill-sensor">${s}</span>`).join("")}
        <span class="pill pill-ai">${idea.ai}</span>
        <span class="pill ${diffColor}">${idea.diff}</span>
      </div>
      ${isOpen ? `<div class="detail">
        <div class="detail-row"><b>Stack:</b> ${idea.stack}</div>
        <div class="detail-row">${idea.detail}</div>
        <div class="wow-box">★ ${idea.wow}</div>
        <button class="build-btn" onclick="event.stopPropagation();sendPrompt('Give me a full 1-day hackathon build plan for: ${idea.title.replace(/'/g,"\\'")} — tech stack, file structure, hour-by-hour timeline, key APIs and libraries, and the winning demo pitch angle')">full build plan ↗</button>
      </div>` : ""}
    `;
    card.onclick = () => { openIdx = (openIdx === idx ? null : idx); render(); };
    grid.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", e => {
  searchQ = e.target.value.trim(); openIdx = null; render();
});

buildStats();
buildTrackFilters();
buildSensorFilters();
render();
</script>
